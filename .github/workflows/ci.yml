name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # npm ci's lock validation differs across npm versions (npm 10 vs 11,
      # and even within 11: optional peers, platform-package fan-out). Pin
      # the exact npm that generated the lockfiles so the validator always
      # matches the generator; bump both together, deliberately.
      - run: npm install -g npm@11.17.0
      # Resolve `scolta` to the unreleased node binding fix. The published
      # registry pin is still 1.0.0, whose CJS entry crashes at require()
      # (the import.meta-in-CJS defect) — that is exactly what the cjs-build
      # regression test guards, but its skipIf goes TRUE on 1.0.0 and the test
      # never runs. Build node `main` (1.0.1, fixed) and link it as the
      # workspace `scolta`, mirroring the documented local dev pattern
      # (`ln -s ../../scolta-node node_modules/scolta`). The lockfile stays
      # registry-resolved (a `link:` entry would break `npm ci`); the symlink
      # is applied after `npm ci`, which would otherwise restore the 1.0.0 pin.
      # Drop this once scolta-node 1.0.1 is published and the dep floor is
      # bumped to `^1.0.1` (TS release track).
      - uses: actions/checkout@v5
        with:
          repository: tag1consulting/scolta-node
          ref: main
          path: scolta-node-src
      - name: Build scolta-node (the binding under test)
        working-directory: scolta-node-src
        run: |
          npm ci
          npm run build
      - run: npm ci
      - name: Link `scolta` to the built node main
        run: |
          rm -rf node_modules/scolta
          ln -s "$GITHUB_WORKSPACE/scolta-node-src" node_modules/scolta
          node -e "console.log('scolta resolves to', require('scolta/package.json').version)"
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:publish
      # Regression guard: assert `npm pack` ships nothing outside the allowlist
      # derived from package.json's `files` field, and stays under the size cap.
      # Runs after build so dist/ exists for the pack dry-run.
      - run: npm run check:pack
